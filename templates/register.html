{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery | Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/register.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

<div class="container">

<a class="navbar-brand logo" href="{% url 'base' %}">
Food<span>Delivery</span>
</a>

<div>

<a href="{% url 'base' %}" class="btn btn-outline-light me-2">
Home
</a>

<a href="{% url 'login' %}" class="btn btn-warning">
Login
</a>

</div>

</div>

</nav>

<section class="register-section">

<div class="overlay">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="register-card">

<h2>Create Your Account</h2>

<p class="text-muted">
Join FoodDelivery and start enjoying delicious meals.
</p>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="POST" action="{% url 'register' %}">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">

<label>Username</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-person-fill"></i>
</span>

<input type="text"
name="username"
class="form-control"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-envelope-fill"></i>
</span>

<input type="email"
name="email"
class="form-control"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Phone</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-telephone-fill"></i>
</span>

<input type="text"
name="phone_number"
class="form-control"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Role</label>

<select name="role"
class="form-select"
required>

<option value="">Select Role</option>
<option value="customer">Customer</option>
<option value="owner">Restaurant Owner</option>
<option value="delivery">Delivery Partner</option>

</select>

</div>

<div class="col-12 mb-3">

<label>Address</label>

<textarea
name="address"
rows="3"
class="form-control"
required></textarea>

</div>

<div class="col-md-6 mb-3">

<label>Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input
type="password"
name="password"
class="form-control"
required>

</div>

</div>

<div class="col-md-6 mb-4">

<label>Confirm Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-shield-lock-fill"></i>
</span>

<input
type="password"
name="confirm_password"
class="form-control"
required>

</div>

</div>

</div>

<button class="btn register-btn w-100">

Create Account

</button>

</form>

<div class="text-center mt-4">

Already have an account?

<a href="{% url 'login' %}">
Login
</a>

</div>

</div>

</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
