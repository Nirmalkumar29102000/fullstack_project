{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Food | Food Delivery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/add_food.css' %}">
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

<div class="container">

<a class="navbar-brand logo" href="#">
Food<span>Delivery</span>
</a>

<a href="{% url 'view_restaurant' %}" class="btn btn-warning">

<i class="bi bi-arrow-left"></i>

Back

</a>

</div>

</nav>

<!-- Form -->

<section class="food-section">

<div class="overlay">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="food-card">

<h2>

<i class="bi bi-basket2-fill"></i>

Add New Food

</h2>

<p class="restaurant-name">

Restaurant :
<strong>{{ restaurant.restaurant_name }}</strong>

</p>

<form method="POST"

action="{% url 'add_food' restaurant.id %}"

enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">

<label>

Food Name

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-egg-fried"></i>

</span>

<input
type="text"
name="food_name"
class="form-control"
placeholder="Enter Food Name"
required>

</div>

</div>

<div class="mb-3">

<label>

Description

</label>

<textarea
name="description"
rows="4"
class="form-control"
placeholder="Enter Food Description"
required></textarea>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>

Price

</label>

<div class="input-group">

<span class="input-group-text">

₹

</span>

<input
type="number"
step="0.01"
name="price"
class="form-control"
placeholder="0.00"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>

Food Image

</label>

<input
type="file"
name="image"
class="form-control"
required>

</div>

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
name="is_available"
checked>

<label class="form-check-label">

Available for Customers

</label>

</div>

<div class="d-grid gap-2">

<button class="btn add-btn">

<i class="bi bi-plus-circle-fill"></i>

Add Food

</button>

<a href="{% url 'view_restaurant' %}"

class="btn btn-outline-dark">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
