{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

    <div class="container">

        <a class="navbar-brand logo" href="{% url 'base' %}">
            Food<span>Delivery</span>
        </a>

        <a href="{% url 'base' %}" class="btn btn-outline-light">
            Home
        </a>

    </div>

</nav>


<!-- Login Section -->

<section class="login-section">

<div class="overlay">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-7">

<div class="login-card">

<h2>Welcome Back 👋</h2>

<p class="text-muted">
Login to continue ordering your favourite food.
</p>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="POST" action="{% url 'login' %}">

{% csrf_token %}

<div class="mb-3">

<label>Email Address</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-envelope-fill"></i>
</span>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

</div>

<div class="mb-4">

<label>Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter your password"
required>

</div>

</div>

<button class="btn login-btn w-100">

Login

</button>

</form>

<div class="text-center mt-4">

Don't have an account?

<a href="{% url 'register' %}">
Register
</a>

</div>

</div>

</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
